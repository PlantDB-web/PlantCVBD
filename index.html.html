<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플랜트 토목/건축 실적 현황 대시보드 – 자푸라2 (SACE2)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#eef1f6; --surface:#fff; --border:#dde2ec; --border-lt:#eef0f5;
  --t1:#18202e; --t2:#4a5568; --t3:#8693a8;
  --navy:#1a3a6b; --navy2:#2554a0;
  --blue:#3478d4; --blue-lt:#ebf2ff;
  --teal:#0d7a5c; --teal-lt:#e5f5f0;
  --red:#c8312a; --red-lt:#fdecea;
  --amber:#c07000; --amber-lt:#fff4e0;
  --green:#1a6e3c; --green-lt:#e6f5ed;
  --gray:#f4f6fa;
  --brown:#7c4a1e; --brown-lt:#fdf3e8;
  --r:6px; --sh:0 1px 4px rgba(0,0,0,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',-apple-system,sans-serif;
     background:var(--bg);color:var(--t1);font-size:12px;line-height:1.5}

/* ── 헤더 ── */
.hdr{background:var(--navy);height:48px;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-badge{background:rgba(255,255,255,.18);color:#fff;font-size:9px;font-weight:800;padding:3px 7px;border-radius:3px;letter-spacing:.5px}
.hdr-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.3px}
.hdr-date{color:rgba(255,255,255,.7);font-size:10px}

/* ── 도메인 탭 ── */
.domain-bar{background:#12294f;display:flex;padding:0 20px}
.domain-btn{height:36px;padding:0 22px;font-size:12px;font-weight:600;
  color:rgba(255,255,255,.5);background:none;border:none;
  border-bottom:3px solid transparent;cursor:pointer;transition:all .15s}
.domain-btn:hover{color:rgba(255,255,255,.85)}
.domain-btn.active{color:#fff;border-bottom-color:#5ba3ff}
.domain-btn.active.bld{border-bottom-color:#f5a623}

/* ── 현장 탭 ── */
.site-bar{background:#1a3560;display:flex;padding:0 20px;border-top:1px solid rgba(255,255,255,.08)}
.site-label{height:30px;display:flex;align-items:center;font-size:9px;font-weight:700;
  color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;margin-right:8px}
.site-btn{height:30px;padding:0 16px;font-size:11px;font-weight:600;
  color:rgba(255,255,255,.45);background:none;border:none;
  border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.site-btn:hover{color:rgba(255,255,255,.8)}
.site-btn.on{color:#fff;border-bottom-color:#7ec8e3}

/* ── PKG 필터 ── */
.pkg-bar{background:#fff;border-bottom:1px solid var(--border);
  padding:6px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pkg-label{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.pkg-btn{padding:3px 13px;font-size:11px;font-weight:600;border-radius:4px;
  border:1px solid var(--border);background:var(--gray);color:var(--t2);
  cursor:pointer;transition:all .12s}
.pkg-btn:hover{border-color:var(--blue);color:var(--blue)}
.pkg-btn.on{background:var(--navy2);color:#fff;border-color:var(--navy2)}
.pkg-btn.on.bld{background:var(--amber);border-color:var(--amber)}
.ref-lbl{margin-left:auto;font-size:10px;color:var(--t3)}
.ref-lbl b{color:var(--t2)}

/* ── 메인 ── */
.main{padding:12px 20px 32px;display:flex;flex-direction:column;gap:14px}

/* ── KPI 행 ── */
.kpi-row{display:grid;gap:8px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:var(--r);
  padding:11px 14px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--kc,var(--blue))}
.kpi-lbl{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.kpi-val{font-size:22px;font-weight:800;line-height:1.1;margin:2px 0 4px}
.kpi-val em{font-size:12px;font-weight:500;color:var(--t2)}
.kpi-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.kpi-plan{font-size:10px;color:var(--t3)}
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;
  font-size:10px;font-weight:700}
.pill.up{background:var(--green-lt);color:var(--green)}
.pill.dn{background:var(--red-lt);color:var(--red)}
.pill.eq{background:var(--gray);color:var(--t2)}
.kpi-qty{font-size:9px;color:var(--t3);margin-top:3px}

/* ── 섹션 카드 ── */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--sh);display:flex;flex-direction:column}
.card-head{padding:9px 14px;border-bottom:1px solid var(--border-lt);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--gray);flex-shrink:0;gap:8px}
.card-head h3{font-size:11px;font-weight:700;color:var(--t1);white-space:nowrap}
.card-head .sub{font-size:9px;color:var(--t3);white-space:nowrap}
.card-legend{display:flex;gap:10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t3)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.chart-area{padding:10px 14px;flex:1;min-height:0;position:relative}
.chart-area canvas{width:100%!important}

/* ── 3단 그리드 ── */
.mid-row{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr) minmax(0,1fr);gap:10px;align-items:stretch}
.mid-row>.card{flex:1}

/* ── 실적 테이블 ── */
.tbl-wrap{overflow-x:auto}
.rtbl{width:100%;border-collapse:collapse;font-size:10.5px}
.rtbl th{padding:5px 8px;text-align:center;font-size:9px;font-weight:700;
  color:var(--t3);text-transform:uppercase;letter-spacing:.3px;
  background:var(--gray);border-bottom:2px solid var(--border);
  border-right:1px solid var(--border-lt);white-space:nowrap}
.rtbl th.lft{text-align:left}
.rtbl td{padding:5px 8px;border-bottom:1px solid var(--border-lt);
  border-right:1px solid var(--border-lt);white-space:nowrap;
  font-variant-numeric:tabular-nums;text-align:right}
.rtbl td.lft{text-align:left;font-weight:600;color:var(--t1)}
.rtbl td.date{text-align:center;color:var(--t2);font-size:10px;font-weight:600}
.rtbl tr:hover td{background:#f8faff}
.rtbl .plan-row td{background:var(--blue-lt);font-weight:700}
.rtbl .plan-row.bld td{background:var(--amber-lt)}
.rtbl .latest td{background:#fffbeb}
.rtbl .grp-hdr td{background:var(--navy);color:#fff;font-weight:700;font-size:10px}
.rtbl .sum-row td{background:#edf2ff;font-weight:700;border-top:2px solid var(--border)}
.rtbl .sum-row.bld td{background:var(--amber-lt)}

/* 진도바 */
.prog-wrap{display:flex;align-items:center;gap:5px;min-width:90px}
.prog-track{flex:1;height:6px;background:#e2e8f2;border-radius:3px;position:relative;overflow:hidden}
.prog-plan{height:6px;position:absolute;border-radius:3px;background:#b8c8e0}
.prog-act{height:6px;position:absolute;border-radius:3px;z-index:2}
.prog-act.ok{background:var(--teal)}
.prog-act.ng{background:var(--red)}
.prog-act.bld{background:var(--amber)}
.prog-pct{font-size:9px;min-width:32px;text-align:right;color:var(--t2);font-weight:700}

/* ── 진도율 요약 배너 ── */
.rate-banner{display:grid;gap:8px;padding:8px 14px;background:var(--gray);
  border-bottom:1px solid var(--border-lt)}

/* ── daily row colors ── */
.d-pos{color:var(--teal);font-weight:700}
.d-pos.bld{color:var(--amber)}
.d-neg{color:var(--red)}
.d-nil{color:#ccc}

/* ── section divider ── */
.section-label{font-size:10px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.6px;
  padding:2px 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px}

/* ── 반응형 ── */
@media(max-width:1080px){.mid-row{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.mid-row{grid-template-columns:1fr};.kpi-row{grid-template-columns:repeat(2,1fr)!important}}
</style>
</head>

let curSite   = 'SACE2';
let curDomain = 'civil';
let curPkg    = 'ALL';

const SITES = {
  'SACE2': { label:'자푸라2 (SACE2)', civil: CIVIL, bld: BLD },
  // 향후 현장 추가 예시:
  // 'SACE3': { label:'자푸라3 (SACE3)', civil: CIVIL_SACE3, bld: BLD_SACE3 },
};

function site()    { return SITES[curSite][curDomain]; }
function isBld()   { return curDomain === 'bld'; }
function pkgList() {
  return site().pkgs;  // 항상 전체 PKG
}

function renderSiteBar() {
  document.getElementById('site-btns').innerHTML =
    Object.keys(SITES).map(s =>
      '<button class="site-btn' + (s === curSite ? ' on' : '') +
      '" onclick="setSite(\'' + s + '\')">' + SITES[s].label + '</button>'
    ).join('');
}

function setSite(s) {
  curSite = s;
  curPkg  = 'ALL';
  renderSiteBar();
  renderPkgBar();
  render();
}

function agg(wtId) {
  const s = site(), pkgs = pkgList();
  const wt = s.workTypes.find(w => w.id === wtId);
  let total = 0, planC = 0, actC = 0;
  pkgs.forEach(p => {
    total += (wt.total[p] || 0);
    planC += ((s.plan[p]   && s.plan[p][wtId]   && s.plan[p][wtId].cumul)   || 0);
    actC  += ((s.actual[p] && s.actual[p][wtId] && s.actual[p][wtId].cumul) || 0);
  });
  const planPct = total ? planC / total : 0;
  const actPct  = total ? actC  / total : 0;
  return { total, planC, actC, planPct, actPct };
}

function setDomain(d) {
  curDomain = d;
  document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + d).classList.add('active');
  curPkg = 'ALL';
  renderSiteBar();
  renderPkgBar();
  render();
}

function renderPkgBar() {
  // PKG 버튼 제거 — 기준일만 업데이트
  const el = document.getElementById('ref-date');
  if (el) el.textContent = site().refDateLabel;
}

function setPkg(p) { /* 미사용 */ }

function mkChart(id, cfg) {
  const el = document.getElementById(id);
  if (!el) return;
  if (CHARTS[id]) CHARTS[id].destroy();
  CHARTS[id] = new Chart(el, cfg);
}

// 계획 대비 실적 요약 테이블
// ═══════════════════════════════════════
function buildSummaryTable(){
  const s=site(), b=isBld(), pkgs=pkgList();
  let trs='';
  let gtotal=0,gplanC=0,gactC=0;

  s.workTypes.forEach(wt=>{
    // 공종 소계
    let wtTotal=0,wtPlanC=0,wtActC=0;
    pkgs.forEach(p=>{
      wtTotal+=(wt.total[p]||0);
      wtPlanC+=((s.plan[p]&&s.plan[p][wt.id]&&s.plan[p][wt.id].cumul)||0);
      wtActC +=((s.actual[p]&&s.actual[p][wt.id]&&s.actual[p][wt.id].cumul)||0);
    });
    if(!wtTotal) return;
    gtotal+=wtTotal; gplanC+=wtPlanC; gactC+=wtActC;
    const planPct=wtPlanC/wtTotal, actPct=wtActC/wtTotal;
    const dv=(actPct-planPct)*100, cls=dv>.05?'up':dv<-.05?'dn':'eq', sg=dv>0?'+':'';
    const pP=Math.min(100,planPct*100), pA=Math.min(100,actPct*100);
    const actClr=dv<-.05?'var(--red)':b?'var(--amber)':'var(--teal)';

    trs+=`<tr>
      <td class="lft">${wt.label}<br><span style="font-size:8px;color:var(--t3)">(${wt.unit})</span></td>
      <td>${f0(wtTotal)}</td>
      <td style="color:var(--navy2);font-weight:700">${f0(wtPlanC)}<br><small>${fp(planPct)}</small></td>
      <td style="color:${actClr};font-weight:700">${f0(wtActC)}<br><small>${fp(actPct)}</small></td>
      <td><span class="pill ${cls}">${sg}${dv.toFixed(1)}</span></td>
      <td>
        <div class="prog-wrap">
          <div class="prog-track">
            <div class="prog-plan" style="width:${pP}%"></div>
            <div class="prog-act ${dv<-.05?'ng':b?'bld':'ok'}" style="width:${pA}%"></div>
          </div>
          <span class="prog-pct">${(actPct*100).toFixed(1)}%</span>
        </div>
      </td>
      <td style="color:var(--red)">${f0(wtTotal-wtActC)}</td>
    </tr>`;

    // PKG별 세부 (ALL 선택시)
    if(curPkg==='ALL'){
      pkgs.forEach(pkg=>{
        const tt=(wt.total[pkg])||0; if(!tt) return;
        const pc=((s.plan[pkg]&&s.plan[pkg][wt.id]&&s.plan[pkg][wt.id].cumul)||0);
        const ac=((s.actual[pkg]&&s.actual[pkg][wt.id]&&s.actual[pkg][wt.id].cumul)||0);
        const pp=tt?pc/tt:0, ap=tt?ac/tt:0;
        const pdv=(ap-pp)*100, pcls=pdv>.05?'up':pdv<-.05?'dn':'eq', psg=pdv>0?'+':'';
        const pActClr=pdv<-.05?'var(--red)':b?'var(--amber)':'var(--teal)';
        trs+=`<tr style="font-size:10px">
          <td class="lft" style="padding-left:16px;color:var(--t3)">└ ${pkg}</td>
          <td style="color:var(--t3)">${f0(tt)}</td>
          <td style="color:var(--navy2)">${f0(pc)} <small>${fp(pp)}</small></td>
          <td style="color:${pActClr}">${f0(ac)} <small>${fp(ap)}</small></td>
          <td><span class="pill ${pcls}" style="font-size:9px">${psg}${pdv.toFixed(1)}</span></td>
          <td>
            <div class="prog-wrap">
              <div class="prog-track">
                <div class="prog-plan" style="width:${Math.min(100,pp*100)}%"></div>
                <div class="prog-act ${pdv<-.05?'ng':b?'bld':'ok'}" style="width:${Math.min(100,ap*100)}%"></div>
              </div>
              <span class="prog-pct" style="font-size:8px">${(ap*100).toFixed(1)}%</span>
            </div>
          </td>
          <td style="color:var(--red)">${f0(tt-ac)}</td>
        </tr>`;
      });
    }
  });

  // 합계
  const gpp=gtotal?gplanC/gtotal:0, gap=gtotal?gactC/gtotal:0;
  const gdv=(gap-gpp)*100, gcls=gdv>.05?'up':gdv<-.05?'dn':'eq', gsg=gdv>0?'+':'';
  trs+=`<tr class="sum-row${b?' bld':''}">
    <td class="lft">합 계</td>
    <td>${f0(gtotal)}</td>
    <td style="color:var(--navy2);font-weight:800">${f0(gplanC)}<br><small>${fp(gpp)}</small></td>
    <td style="color:${gdv<-.05?'var(--red)':b?'var(--amber)':'var(--teal)'};font-weight:800">${f0(gactC)}<br><small>${fp(gap)}</small></td>
    <td><span class="pill ${gcls}">${gsg}${gdv.toFixed(1)}</span></td>
    <td>
      <div class="prog-wrap">
        <div class="prog-track">
          <div class="prog-plan" style="width:${Math.min(100,gpp*100)}%"></div>
          <div class="prog-act ${gdv<-.05?'ng':b?'bld':'ok'}" style="width:${Math.min(100,gap*100)}%"></div>
        </div>
        <span class="prog-pct">${(gap*100).toFixed(1)}%</span>
      </div>
    </td>
    <td style="color:var(--red)">${f0(gtotal-gactC)}</td>
  </tr>`;

  return `<div class="card">
    <div class="card-head">
      <h3>📊 계획 대비 실적 현황</h3>
      <span class="sub">기준: ${site().refDateLabel} | ${curPkg==='ALL'?'전체':curPkg}</span>
    </div>
    <div class="tbl-wrap">
      <table class="rtbl">
        <thead><tr>
          <th class="lft" style="width:120px">공종</th>
          <th>전체물량</th>
          <th style="color:var(--navy2)">계획누적</th>
          <th style="color:${b?'var(--amber)':'var(--teal)'}">실적누적</th>
          <th>편차(%p)</th>
          <th style="width:110px">진도율</th>
          <th style="color:var(--red)">잔여</th>
        </tr></thead>
        <tbody>${trs}</tbody>
      </table>
    </div>
  </div>`;
}

// ═══════════════════════════════════════
// 일일 실적 테이블
// ═══════════════════════════════════════
function buildDailyTable(){
  const s=site(), b=isBld(), pkgs=pkgList(), wts=s.workTypes;
  const activeWts=wts.filter(wt=>pkgs.some(p=>(wt.total[p]||0)>0));

  // thead 2단
  let th1=`<th rowspan="2" class="lft" style="min-width:80px">날짜</th>`;
  let th2='';
  activeWts.forEach(wt=>{
    th1+=`<th colspan="${pkgs.length*2}" class="grp-th" style="background:${b?'#8c5a0d':s.pkgs.length>1?'var(--navy)':'var(--navy)'};color:#fff">${wt.label.replace(' Concrete','').replace(' Works','')}</th>`;
    pkgs.forEach(p=>{
      th2+=`<th style="font-size:8px">${p}<br>일일</th><th style="font-size:8px">${p}<br>누적</th>`;
    });
  });

  // tbody
  let tbRows='';
  s.daily.forEach(row=>{
    const isLatest=!!row.latest;
    let tds=`<td class="date${isLatest?' latest-mark':''}">${fmtDate(row.date)}${isLatest?' ★':''}</td>`;
    activeWts.forEach(wt=>{
      pkgs.forEach(p=>{
        const cell=(row[p]&&row[p][wt.id])||{};
        const d=cell.d, c=cell.c;
        const dCls=d!=null?(b?'d-pos bld':'d-pos'):'d-nil';
        tds+=`<td class="${dCls}">${d!=null?f1(d):'—'}</td>`;
        tds+=`<td style="color:var(--t2)">${c!=null?f0(c):'—'}</td>`;
      });
    });
    tbRows+=`<tr class="${isLatest?'latest':''}">${tds}</tr>`;
  });

  // 계획 행
  let planTds=`<td class="date" style="color:${b?'var(--amber)':'var(--navy2)'};font-weight:700">W15 계획</td>`;
  activeWts.forEach(wt=>{
    pkgs.forEach(p=>{
      const pl=(s.plan[p]&&s.plan[p][wt.id])||{};
      planTds+=`<td style="color:${b?'var(--amber)':'var(--navy2)'};font-weight:700">${pl.weekly!=null?f1(pl.weekly):'—'}</td>`;
      planTds+=`<td style="color:${b?'var(--amber)':'var(--navy2)'};font-weight:700">${pl.cumul!=null?f0(pl.cumul):'—'}</td>`;
    });
  });
  tbRows+=`<tr class="plan-row${b?' bld':''}">${planTds}</tr>`;

  return `<div class="card">
    <div class="card-head">
      <h3>📋 일일 실적 현황</h3>
      <span class="sub">★ 최근 기준일 &nbsp;|&nbsp; W15 주간 계획 포함</span>
    </div>
    <div class="tbl-wrap">
      <table class="rtbl">
        <thead><tr>${th1}</tr><tr>${th2}</tr></thead>
        <tbody>${tbRows}</tbody>
      </table>
    </div>
  </div>`;
}
